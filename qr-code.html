<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码访问 - Care-for-Rent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1A2438 0%, #25324D 50%, #1A2438 100%);
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    user-select: none;
  }

  .card {
    background: #FFFFFF;
    border-radius: 24px;
    padding: 48px 44px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 420px;
    width: 90%;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo {
    width: 40px;
    height: 52px;
  }

  .brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: #1A2438;
    letter-spacing: 0.04em;
  }

  h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    color: #1A2438;
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #666666;
    margin-bottom: 28px;
    line-height: 1.5;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }

  #qrcode {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }

  #qrcode canvas,
  #qrcode img {
    border: 3px solid #A8CC87;
    border-radius: 12px;
    padding: 6px;
    background: #fff;
  }

  .url-box {
    background: #F5F7FA;
    border: 1px solid #E8ECF1;
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 0.82rem;
    color: #1A2438;
    word-break: break-all;
    margin-bottom: 20px;
  }

  .tip {
    font-size: 0.8rem;
    color: #999;
    line-height: 1.5;
  }

  .tip strong {
    color: #A8CC87;
    background: #1A2438;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }

  .footer-note {
    margin-top: 20px;
    font-size: 0.75rem;
    color: #bbb;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <svg class="logo" viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g clip-path="url(#qr-logo-clip-left)">
        <path d="M4,2 L4,50 A24,24 0 0,1 4,2 Z" fill="#1A2438"/>
      </g>
      <g clip-path="url(#qr-logo-clip-right)">
        <path d="M4,2 L4,50 A24,24 0 0,1 4,2 Z" fill="#A8CC87"/>
      </g>
      <circle cx="16" cy="26" r="6.5" fill="#FFFFFF"/>
      <defs>
        <clipPath id="qr-logo-clip-left">
          <rect x="0" y="0" width="16" height="52"/>
        </clipPath>
        <clipPath id="qr-logo-clip-right">
          <rect x="16" y="0" width="24" height="52"/>
        </clipPath>
      </defs>
    </svg>
    <span class="brand">DUO Studio</span>
  </div>

  <h1>Care-for-Rent</h1>
  <p class="subtitle">Community Mutual Elderly Care<br>Risk Prevention System</p>

  <div id="qrcode"></div>

  <div class="url-box" id="urlDisplay"></div>

  <p class="tip">
    用手机相机<strong>扫描二维码</strong><br>即可在任何地方访问此页面
  </p>

  <p class="footer-note">DUO Studio &copy; 2026</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  const BASE = 'https://f09f4e984e91fff4-223-95-76-245.serveousercontent.com';
  const FILENAME = 'deepseek_html_20260617_bbf059(1).html';
  const url = `${BASE}/${encodeURIComponent(FILENAME)}`;

  document.getElementById('urlDisplay').textContent = url;

  new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#1A2438',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
